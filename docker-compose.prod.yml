services:
  app:
    image: ghcr.io/janmadon/automessager:latest
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - app_storage:/var/www/html/storage
      - app_database:/var/www/html/database
      - app_public:/var/www/html/public
      - .env:/var/www/html/.env
    networks:
      - laravel
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - app_public:/var/www/html/public:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - laravel
    depends_on:
      - app

  db:
    image: alpine:latest
    container_name: laravel_db_placeholder
    command: tail -f /dev/null
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  app_storage:
    driver: local
  app_database:
    driver: local
  app_public:
    driver: local
